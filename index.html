<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocX - Modern Document Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-vault"></i>
                <span>DocX</span>
            </div>
            <nav>
                <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-folder"></i> Assets</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-star"></i> Favorites</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-trash"></i> Trash</a>
            </nav>
            <div class="storage-info">
                <div class="storage-text">
                    <span>Local Storage</span>
                    <span id="storage-used">0 MB</span>
                </div>
                <div class="progress-bar">
                    <div class="progress" style="width: 0%;"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search documents...">
                </div>
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="action-bar">
                    <h2>My Documents</h2>
                    <label for="file-upload" class="upload-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Upload Document
                    </label>
                    <input type="file" id="file-upload" style="display: none;" multiple>
                </div>

                <!-- Document Grid -->
                <div class="documents-grid" id="documents-grid">
                    <!-- Documents will be dynamically added here -->
                    <div class="empty-state" id="empty-state">
                        <i class="fa-solid fa-folder-open"></i>
                        <p>No documents found. Upload a document to get started.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div class="modal" id="preview-modal">
        <div class="modal-content">
            <span class="close-modal"><i class="fa-solid fa-times"></i></span>
            <div class="modal-header">
                <h3 id="preview-title">Document Preview</h3>
                <div class="modal-actions">
                    <button id="download-btn" class="icon-btn"><i class="fa-solid fa-download"></i></button>
                </div>
            </div>
            <div class="preview-container" id="preview-container">
                <!-- Preview content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Edit Name Modal -->
    <div class="modal" id="edit-modal">
        <div class="modal-content small-modal">
            <span class="close-modal"><i class="fa-solid fa-times"></i></span>
            <h3>Rename Document</h3>
            <input type="text" id="new-doc-name" class="modern-input" placeholder="Enter new name...">
            <div class="modal-buttons">
                <button id="cancel-edit" class="btn-secondary">Cancel</button>
                <button id="save-edit" class="btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="delete-modal">
        <div class="modal-content small-modal">
            <span class="close-modal"><i class="fa-solid fa-times"></i></span>
            <h3>Delete Document</h3>
            <p style="margin: 16px 0; color: var(--text-secondary);">Are you sure you want to delete this document? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button id="cancel-delete" class="btn-secondary">Cancel</button>
                <button id="confirm-delete" class="btn-primary" style="background-color: var(--danger-color);">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
